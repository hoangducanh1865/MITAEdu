spring:
  datasource:
    url: jdbc:h2:mem:mitadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Skip V2__seed_data.sql migration that has errors
    target: 1.0

logging:
  level:
    com.mita: DEBUG
    org.springframework.security: DEBUG

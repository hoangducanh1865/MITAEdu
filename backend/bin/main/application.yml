spring:
  application:
    name: mita-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mita_db
    username: ${DB_USERNAME:mita}
    password: ${DB_PASSWORD:mita}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

mita:
  jwt:
    secret: ${JWT_SECRET:mita-super-secret-key-change-in-production-2026}
    expiration-ms: 86400000   # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

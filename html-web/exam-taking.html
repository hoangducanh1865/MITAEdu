<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MoonEdu - Làm Bài Thi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- MathJax for math rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="exam-taking-body">

<!-- TOP BAR -->
<header class="et-header">
  <div class="et-header-left">
    <div class="et-logo">🌙</div>
    <span class="et-exam-title" id="etTitle">Tư Duy Toán Học 07</span>
    <span class="et-exam-code" id="etCode">TSA_B60DD</span>
  </div>
</header>

<div class="et-layout">

  <!-- LEFT: Question area -->
  <main class="et-main">
    <div class="et-question-wrap" id="etQuestionWrap">
      <div class="et-q-num" id="etQNum">1</div>
      <div class="et-q-text" id="etQText"></div>
      <div class="et-options" id="etOptions"></div>
    </div>

    <!-- Per-question timer -->
    <div class="et-qtimer">Thời gian làm câu hiện tại <span class="et-qtimer-val" id="etQTimer">0:20</span></div>
  </main>

  <!-- RIGHT: Info panel -->
  <aside class="et-sidebar">
    <div class="et-sb-section">
      <div class="et-sb-label">Thông tin thí sinh</div>
      <div class="et-sb-row"><span>Họ tên</span><span class="et-sb-val">Hoàng Đức Anh</span></div>
    </div>

    <div class="et-sb-section">
      <div class="et-sb-row et-timer-row">
        <span>Thời gian còn lại</span>
        <span class="et-countdown" id="etCountdown">60:00</span>
      </div>
      <button class="et-nop-btn" id="etNopBtn" onclick="showSubmitConfirm()">Nộp bài</button>
    </div>

    <div class="et-sb-section">
      <div class="et-sb-row">
        <span class="et-sb-label">Chỉ thị màu sắc:</span>
        <span class="et-legend"><span class="et-dot dot-done">40</span><span class="et-dot dot-cur" id="dotAnswered">0</span><span class="et-dot dot-skip" id="dotSkipped">0</span></span>
      </div>
      <!-- Question grid -->
      <div class="et-qgrid" id="etQGrid"></div>
    </div>

    <div class="et-sb-section et-progress-section">
      <div class="et-sb-row"><span>Bạn đã hoàn thành</span><span id="etProgressText">0/40 câu</span></div>
      <div class="et-progress-bar"><div class="et-progress-fill" id="etProgressFill" style="width:0%"></div></div>
    </div>

    <div class="et-connected"><i class="fas fa-circle et-conn-dot"></i> Đã kết nối máy chủ</div>
  </aside>
</div>

<!-- Bottom nav -->
<div class="et-bottom-nav">
  <button class="et-nav-btn" id="etPrevBtn" onclick="goQuestion(currentQ-1)"><i class="fas fa-chevron-left"></i></button>
  <button class="et-next-btn" onclick="goQuestion(currentQ+1)">Câu tiếp <i class="fas fa-chevron-right"></i></button>
</div>

<!-- Submit confirm overlay -->
<div class="et-submit-overlay" id="etSubmitOverlay" style="display:none">
  <div class="et-submit-box">
    <div class="et-submit-title">Xác nhận nộp bài</div>
    <div class="et-submit-info" id="etSubmitInfo"></div>
    <div class="et-submit-btns">
      <button class="et-submit-cancel" onclick="document.getElementById('etSubmitOverlay').style.display='none'">Tiếp tục làm bài</button>
      <button class="et-submit-confirm" onclick="submitExam()">Nộp bài ngay</button>
    </div>
  </div>
</div>

<script>
/* ── QUESTIONS DATA ── */
var QUESTIONS = [{"id": 1, "text": "Cho hàm số $f(x)$ xác định trên $\\mathbb{R}$ thỏa mãn $f'(x) = \\dfrac{5x+1}{x+2}$. Biết $f(0) = 2$. Tính $f(2) + f(3)$.", "opts": ["$29 - 11\\ln 5$", "$29 - 9\\ln 5$", "$29 - \\ln 5$", "$29 + 11\\ln 5$"], "ans": 0}, {"id": 2, "text": "Nghiệm của phương trình $\\log_2(x+3) = 4$ là:", "opts": ["$x = 13$", "$x = 11$", "$x = 19$", "$x = 7$"], "ans": 0}, {"id": 3, "text": "Tập nghiệm của bất phương trình $2^{x-1} \\geq 8$ là:", "opts": ["$[4; +\\infty)$", "$[3; +\\infty)$", "$(-\\infty; 3]$", "$[2; +\\infty)$"], "ans": 0}, {"id": 4, "text": "Giá trị của $\\int_0^1 (3x^2 - 2x + 1)\\,dx$ bằng:", "opts": ["$1$", "$2$", "$0$", "$-1$"], "ans": 0}, {"id": 5, "text": "Trong không gian $Oxyz$, khoảng cách từ điểm $M(1;2;3)$ đến mặt phẳng $2x - y + 2z - 1 = 0$ bằng:", "opts": ["$\\dfrac{7}{3}$", "$\\dfrac{5}{3}$", "$3$", "$\\dfrac{8}{3}$"], "ans": 0}, {"id": 6, "text": "Số phức $z = (2+3i)(1-i)$ có phần thực bằng:", "opts": ["$5$", "$3$", "$-1$", "$2$"], "ans": 0}, {"id": 7, "text": "Diện tích hình phẳng giới hạn bởi $y = x^2$ và $y = x$ bằng:", "opts": ["$\\dfrac{1}{6}$", "$\\dfrac{1}{3}$", "$\\dfrac{1}{2}$", "$1$"], "ans": 0}, {"id": 8, "text": "Giới hạn $\\lim_{x \\to 0} \\dfrac{\\sin 3x}{x}$ bằng:", "opts": ["$3$", "$1$", "$0$", "$\\dfrac{1}{3}$"], "ans": 0}, {"id": 9, "text": "Đạo hàm của hàm số $y = \\ln(x^2+1)$ là:", "opts": ["$\\dfrac{2x}{x^2+1}$", "$\\dfrac{1}{x^2+1}$", "$\\dfrac{x}{x^2+1}$", "$\\dfrac{2}{x^2+1}$"], "ans": 0}, {"id": 10, "text": "Tổng $\\sum_{k=1}^{10} k^2$ bằng:", "opts": ["$385$", "$285$", "$330$", "$440$"], "ans": 0}, {"id": 11, "text": "Câu hỏi tư duy số 11: Nếu $a + b = 10$ và $ab = 5$, thì $a^2 + b^2$ bằng:", "opts": ["$90$", "$100$", "$100$", "$10$"], "ans": 0}, {"id": 12, "text": "Câu hỏi tư duy số 12: Nếu $a + b = 11$ và $ab = 6$, thì $a^2 + b^2$ bằng:", "opts": ["$109$", "$119$", "$121$", "$12$"], "ans": 0}, {"id": 13, "text": "Câu hỏi tư duy số 13: Nếu $a + b = 12$ và $ab = 7$, thì $a^2 + b^2$ bằng:", "opts": ["$130$", "$140$", "$144$", "$14$"], "ans": 0}, {"id": 14, "text": "Câu hỏi tư duy số 14: Nếu $a + b = 13$ và $ab = 8$, thì $a^2 + b^2$ bằng:", "opts": ["$153$", "$163$", "$169$", "$16$"], "ans": 0}, {"id": 15, "text": "Câu hỏi tư duy số 15: Nếu $a + b = 14$ và $ab = 9$, thì $a^2 + b^2$ bằng:", "opts": ["$178$", "$188$", "$196$", "$18$"], "ans": 0}, {"id": 16, "text": "Câu hỏi tư duy số 16: Nếu $a + b = 15$ và $ab = 10$, thì $a^2 + b^2$ bằng:", "opts": ["$205$", "$215$", "$225$", "$20$"], "ans": 0}, {"id": 17, "text": "Câu hỏi tư duy số 17: Nếu $a + b = 16$ và $ab = 11$, thì $a^2 + b^2$ bằng:", "opts": ["$234$", "$244$", "$256$", "$22$"], "ans": 0}, {"id": 18, "text": "Câu hỏi tư duy số 18: Nếu $a + b = 17$ và $ab = 12$, thì $a^2 + b^2$ bằng:", "opts": ["$265$", "$275$", "$289$", "$24$"], "ans": 0}, {"id": 19, "text": "Câu hỏi tư duy số 19: Nếu $a + b = 18$ và $ab = 13$, thì $a^2 + b^2$ bằng:", "opts": ["$298$", "$308$", "$324$", "$26$"], "ans": 0}, {"id": 20, "text": "Câu hỏi tư duy số 20: Nếu $a + b = 19$ và $ab = 14$, thì $a^2 + b^2$ bằng:", "opts": ["$333$", "$343$", "$361$", "$28$"], "ans": 0}, {"id": 21, "text": "Câu hỏi tư duy số 21: Nếu $a + b = 20$ và $ab = 15$, thì $a^2 + b^2$ bằng:", "opts": ["$370$", "$380$", "$400$", "$30$"], "ans": 0}, {"id": 22, "text": "Câu hỏi tư duy số 22: Nếu $a + b = 21$ và $ab = 16$, thì $a^2 + b^2$ bằng:", "opts": ["$409$", "$419$", "$441$", "$32$"], "ans": 0}, {"id": 23, "text": "Câu hỏi tư duy số 23: Nếu $a + b = 22$ và $ab = 17$, thì $a^2 + b^2$ bằng:", "opts": ["$450$", "$460$", "$484$", "$34$"], "ans": 0}, {"id": 24, "text": "Câu hỏi tư duy số 24: Nếu $a + b = 23$ và $ab = 18$, thì $a^2 + b^2$ bằng:", "opts": ["$493$", "$503$", "$529$", "$36$"], "ans": 0}, {"id": 25, "text": "Câu hỏi tư duy số 25: Nếu $a + b = 24$ và $ab = 19$, thì $a^2 + b^2$ bằng:", "opts": ["$538$", "$548$", "$576$", "$38$"], "ans": 0}, {"id": 26, "text": "Câu hỏi tư duy số 26: Nếu $a + b = 25$ và $ab = 20$, thì $a^2 + b^2$ bằng:", "opts": ["$585$", "$595$", "$625$", "$40$"], "ans": 0}, {"id": 27, "text": "Câu hỏi tư duy số 27: Nếu $a + b = 26$ và $ab = 21$, thì $a^2 + b^2$ bằng:", "opts": ["$634$", "$644$", "$676$", "$42$"], "ans": 0}, {"id": 28, "text": "Câu hỏi tư duy số 28: Nếu $a + b = 27$ và $ab = 22$, thì $a^2 + b^2$ bằng:", "opts": ["$685$", "$695$", "$729$", "$44$"], "ans": 0}, {"id": 29, "text": "Câu hỏi tư duy số 29: Nếu $a + b = 28$ và $ab = 23$, thì $a^2 + b^2$ bằng:", "opts": ["$738$", "$748$", "$784$", "$46$"], "ans": 0}, {"id": 30, "text": "Câu hỏi tư duy số 30: Nếu $a + b = 29$ và $ab = 24$, thì $a^2 + b^2$ bằng:", "opts": ["$793$", "$803$", "$841$", "$48$"], "ans": 0}, {"id": 31, "text": "Câu hỏi tư duy số 31: Nếu $a + b = 30$ và $ab = 25$, thì $a^2 + b^2$ bằng:", "opts": ["$850$", "$860$", "$900$", "$50$"], "ans": 0}, {"id": 32, "text": "Câu hỏi tư duy số 32: Nếu $a + b = 31$ và $ab = 26$, thì $a^2 + b^2$ bằng:", "opts": ["$909$", "$919$", "$961$", "$52$"], "ans": 0}, {"id": 33, "text": "Câu hỏi tư duy số 33: Nếu $a + b = 32$ và $ab = 27$, thì $a^2 + b^2$ bằng:", "opts": ["$970$", "$980$", "$1024$", "$54$"], "ans": 0}, {"id": 34, "text": "Câu hỏi tư duy số 34: Nếu $a + b = 33$ và $ab = 28$, thì $a^2 + b^2$ bằng:", "opts": ["$1033$", "$1043$", "$1089$", "$56$"], "ans": 0}, {"id": 35, "text": "Câu hỏi tư duy số 35: Nếu $a + b = 34$ và $ab = 29$, thì $a^2 + b^2$ bằng:", "opts": ["$1098$", "$1108$", "$1156$", "$58$"], "ans": 0}, {"id": 36, "text": "Câu hỏi tư duy số 36: Nếu $a + b = 35$ và $ab = 30$, thì $a^2 + b^2$ bằng:", "opts": ["$1165$", "$1175$", "$1225$", "$60$"], "ans": 0}, {"id": 37, "text": "Câu hỏi tư duy số 37: Nếu $a + b = 36$ và $ab = 31$, thì $a^2 + b^2$ bằng:", "opts": ["$1234$", "$1244$", "$1296$", "$62$"], "ans": 0}, {"id": 38, "text": "Câu hỏi tư duy số 38: Nếu $a + b = 37$ và $ab = 32$, thì $a^2 + b^2$ bằng:", "opts": ["$1305$", "$1315$", "$1369$", "$64$"], "ans": 0}, {"id": 39, "text": "Câu hỏi tư duy số 39: Nếu $a + b = 38$ và $ab = 33$, thì $a^2 + b^2$ bằng:", "opts": ["$1378$", "$1388$", "$1444$", "$66$"], "ans": 0}, {"id": 40, "text": "Câu hỏi tư duy số 40: Nếu $a + b = 39$ và $ab = 34$, thì $a^2 + b^2$ bằng:", "opts": ["$1453$", "$1463$", "$1521$", "$68$"], "ans": 0}];
var TOTAL = QUESTIONS.length;
var answers = {};   /* questionId -> optionIndex */
var currentQ = 0;     /* 0-based index */
var perQTimer = 0;
var perQInterval = null;
var examMinutes = 60;

/* ── INIT ── */
var params = new URLSearchParams(location.search);
var examName = decodeURIComponent(params.get('name') || 'Tư Duy Toán Học 07');
examMinutes  = parseInt(params.get('minutes') || '60');

document.getElementById('etTitle').textContent = examName;
document.getElementById('etCode').textContent  = 'TSA_B60DD';
document.getElementById('etCountdown').textContent = examMinutes + ':00';

buildGrid();
renderQuestion(0);
startCountdown(examMinutes * 60);

/* ── GRID ── */
function buildGrid() {
  var grid = document.getElementById('etQGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach(function(q, i) {
    var btn = document.createElement('button');
    btn.className = 'et-qbtn' + (i === 0 ? ' et-qbtn-current' : '');
    btn.id = 'qbtn-' + i;
    btn.textContent = i + 1;
    btn.onclick = function(){ goQuestion(i); };
    grid.appendChild(btn);
  });
}

/* ── RENDER QUESTION ── */
function renderQuestion(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  currentQ = idx;
  var q = QUESTIONS[idx];
  
  document.getElementById('etQNum').textContent = idx + 1;
  document.getElementById('etQText').innerHTML  = q.text;
  
  var opts = document.getElementById('etOptions');
  opts.innerHTML = '';
  var labels = ['A','B','C','D'];
  q.opts.forEach(function(opt, oi) {
    var div = document.createElement('div');
    var isChosen = answers[q.id] === oi;
    div.className = 'et-option' + (isChosen ? ' et-option-chosen' : '');
    div.innerHTML =
      '<span class="et-opt-label">' + labels[oi] + '</span>' +
      '<span class="et-opt-text">' + opt + '</span>';
    div.onclick = (function(oidx){ return function(){ chooseAnswer(idx, oidx); }; })(oi);
    opts.appendChild(div);
  });

  /* update grid */
  document.querySelectorAll('.et-qbtn').forEach(function(b,i){
    b.classList.remove('et-qbtn-current','et-qbtn-answered');
    if (i === idx) b.classList.add('et-qbtn-current');
    else if (answers[QUESTIONS[i].id] !== undefined) b.classList.add('et-qbtn-answered');
  });

  updateProgress();
  
  /* MathJax re-render */
  if (window.MathJax) MathJax.typesetPromise([document.getElementById('etQuestionWrap')]);

  /* reset per-question timer */
  clearInterval(perQInterval);
  perQTimer = 0;
  updateQTimer();
  perQInterval = setInterval(function(){ perQTimer++; updateQTimer(); }, 1000);

  /* prev button */
  document.getElementById('etPrevBtn').disabled = idx === 0;
}

function updateQTimer() {
  var s = perQTimer % 60;
  var m = Math.floor(perQTimer / 60);
  document.getElementById('etQTimer').textContent = m + ':' + (s < 10 ? '0'+s : s);
}

function chooseAnswer(qIdx, optIdx) {
  var qid = QUESTIONS[qIdx].id;
  answers[qid] = optIdx;
  renderQuestion(qIdx);
}

function goQuestion(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  renderQuestion(idx);
}

function updateProgress() {
  var done = Object.keys(answers).length;
  var pct  = Math.round(done / TOTAL * 100);
  document.getElementById('etProgressText').textContent = done + '/' + TOTAL + ' câu';
  document.getElementById('etProgressFill').style.width = pct + '%';
  document.getElementById('dotAnswered').textContent = done;
  document.getElementById('dotSkipped').textContent  = TOTAL - done;
}

/* ── COUNTDOWN ── */
function startCountdown(totalSecs) {
  var secs = totalSecs;
  var el = document.getElementById('etCountdown');
  var interval = setInterval(function(){
    secs--;
    if (secs <= 0) { clearInterval(interval); submitExam(); return; }
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    el.textContent = m + ':' + (s < 10 ? '0' + s : s);
    if (secs <= 300) el.classList.add('et-countdown-urgent');
  }, 1000);
}

/* ── SUBMIT ── */
function showSubmitConfirm() {
  var done = Object.keys(answers).length;
  document.getElementById('etSubmitInfo').innerHTML =
    'Bạn đã trả lời <strong>' + done + '/' + TOTAL + '</strong> câu hỏi.<br>' +
    (TOTAL - done > 0 ? '<span style="color:#e65100">Còn ' + (TOTAL-done) + ' câu chưa trả lời.</span>' : 'Tuyệt vời! Bạn đã hoàn thành tất cả.');
  document.getElementById('etSubmitOverlay').style.display = 'flex';
}

function submitExam() {
  clearInterval(perQInterval);
  var done = Object.keys(answers).length;
  alert('Đã nộp bài!\nSố câu hoàn thành: ' + done + '/' + TOTAL);
  window.location.href = 'prac-tsa-de-admin.html';
}
</script>
</body>
</html>

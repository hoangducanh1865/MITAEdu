<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MITAEdu - Xác Nhận Dự Thi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="exam-bg">

<div class="ec-wrap">

  <!-- Brand header -->
  <div class="ec-brand">
    <div class="ec-logo">🌙</div>
    <span class="ec-logo-text">Moon<strong>Edu</strong></span>
    <div class="ec-divider"></div>
    <div>
      <div class="ec-sys-title">HỆ THỐNG MITAEDU</div>
      <div class="ec-sys-sub">Vững nền tảng sáng tương lai</div>
    </div>
  </div>

  <div class="ec-section-title">Xác nhận thông tin dự thi</div>

  <div class="ec-info-grid">
    <div class="ec-info-row">
      <span class="ec-info-label">Họ tên</span>
      <span class="ec-info-val">Hoàng Đức Anh</span>
    </div>
    <div class="ec-info-row">
      <span class="ec-info-label">Kíp thi</span>
      <span class="ec-info-val" id="ecExamName">Tư Duy Toán Học 07</span>
    </div>
    <div class="ec-info-row">
      <span class="ec-info-label">Thời gian làm bài</span>
      <span class="ec-info-val" id="ecDuration">60 phút</span>
    </div>
  </div>

  <div class="ec-note">
    <em>Lưu ý: Bằng việc nhấn nút "Bắt đầu thi" hệ thống sẽ bắt đầu tính giờ cho bài thi của bạn</em>
  </div>

  <button class="ec-start-btn" id="ecStartBtn">Bắt đầu thi</button>

  <div class="ec-footer-links">
    <a href="javascript:history.back()" class="ec-link">Quay lại</a>
    <a href="#" class="ec-link">Hướng dẫn</a>
  </div>

</div>

<script>
var params = new URLSearchParams(location.search);
var name    = decodeURIComponent(params.get('name') || 'Tư Duy Toán Học 07');
var minutes = parseInt(params.get('minutes') || '60');
var slug    = params.get('slug') || 'tu-duy-toan-hoc-07';

document.getElementById('ecExamName').textContent = name;
document.getElementById('ecDuration').textContent = minutes + ' phút';

document.getElementById('ecStartBtn').addEventListener('click', function(){
  var p = new URLSearchParams({ slug: slug, name: encodeURIComponent(name), minutes: minutes });
  window.location.href = 'exam-taking.html?' + p.toString();
});
</script>
</body>
</html>
